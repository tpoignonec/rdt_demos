# GitHub Actions CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-rdt

      - name: Check rdt
        run: rdt info

      - name: Install pre-commit
        run: apt-get install -y --no-install-recommends pre-commit

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run pre-commit
        run: pre-commit run --all-files

  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-rdt

      - name: Check rdt
        run: rdt info

      - name: Install dependencies
        run: rdt deps

      - name: Build
        run: rdt build

      - name: Test
        run: rdt test

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-rdt
        with:
          install-system-deps: 'false'

      - name: Build image
        run: rdt docker-build


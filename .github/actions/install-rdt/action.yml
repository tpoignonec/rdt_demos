name: Install rdt
description: Install rdt tool into a virtualenv at /opt/venv

inputs:
  install-system-deps:
    description: Install git and python3-venv via apt-get (not needed on bare ubuntu-latest runners)
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install system dependencies
      if: inputs.install-system-deps == 'true'
      shell: bash
      run: |
        apt-get update \
        && apt-get install -y --no-install-recommends \
          git \
          python3-pip python3-venv

    - name: Install rdt
      shell: bash
      run: |
        python3 -m venv /opt/venv \
        && /opt/venv/bin/pip install --upgrade pip \
        && /opt/venv/bin/pip install git+https://github.com/tpoignonec/rdt.git@main \
        && ln -s /opt/venv/bin/rdt /usr/local/bin/rdt
